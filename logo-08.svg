<svg width="600" height="160" viewBox="0 0 600 160" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="160" fill="white"/>
  <!-- DF-17 Body -->
  <path fill="#000000" d="M30,80 L450,50 L450,110 Z"/>
  <!-- Forward-swept wings -->
  <path fill="#D4AF37" d="M290,52 L410,22 L440,18 L440,98 L410,92 L290,108 Z"/>
  <!-- Rear fins -->
  <path fill="#D4AF37" d="M430,55 L468,40 L468,90 L430,75 Z"/>
  <!-- Dragon - full body wrapping missile -->
  <path fill="none" stroke="#D4AF37" stroke-width="3" d="M80,80 Q120,45 180,55 Q240,65 280,50"/>
  <path fill="none" stroke="#D4AF37" stroke-width="2" d="M80,80 Q120,115 180,105 Q240,95 280,110"/>
  <!-- Dragon head -->
  <circle cx="45" cy="80" r="10" fill="#D4AF37"/>
  <!-- Eyes -->
  <circle cx="50" cy="77" r="2" fill="#000000"/>
  <circle cx="50" cy="83" r="2" fill="#000000"/>
  <!-- Mouth open -->
  <path fill="#000000" d="M35,80 L45,77 L45,83 Z"/>
  <!--吟 Sound energy -->
  <circle cx="20" cy="80" r="3" fill="#D4AF37"/>
  <circle cx="12" cy="80" r="2" fill="#D4AF37"/>
  <circle cx="6" cy="80" r="1" fill="#D4AF37"/>
  <!-- Text -->
  <text x="300" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" letter-spacing="8" fill="#000000">CHANT</text>
  <text x="300" y="155" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="16" fill="#D4AF37">龙吟</text>
</svg>

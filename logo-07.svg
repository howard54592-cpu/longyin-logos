<svg width="400" height="240" viewBox="0 0 400 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .gold { fill: #D4AF37; }
      .black { fill: #000000; }
      .text-zh { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; font-weight: bold; font-size: 28px; }
      .text-en { font-family: Arial, sans-serif; font-size: 14px; letter-spacing: 6px; }
    </style>
  </defs>
  <!-- DF-17 integrated into a circle -->
  <circle cx="200" cy="100" r="85" fill="none" stroke="#D4AF37" stroke-width="2" stroke-dasharray="10 5" />
  <path class="black" d="M60,100 L340,65 L340,135 Z" />
  <!-- Dragon Element: Coiled tail feel -->
  <path class="gold" d="M300,100 Q340,100 340,120 T300,140" fill="none" stroke="#D4AF37" stroke-width="3" />
  <!-- Text -->
  <text x="200" y="185" text-anchor="middle" class="black text-zh">龙吟</text>
  <text x="200" y="210" text-anchor="middle" class="black text-en">CHANT</text>
</svg>

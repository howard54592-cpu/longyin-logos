<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- Dragon head - minimalist sharp strokes -->
  <g fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main head shape - long angular snout facing right -->
    <path d="M 120 150 Q 140 120 180 100 Q 220 80 260 90 Q 300 100 320 130 Q 340 160 330 200 Q 320 240 280 260 Q 240 280 200 270 Q 160 260 140 230 Q 120 200 130 160 Q 135 140 120 150"/>
    
    <!-- Eye -->
    <circle cx="200" cy="150" r="8" fill="black" stroke="none"/>
    
    <!-- Open mouth -->
    <path d="M 280 220 Q 320 230 340 260 Q 350 290 320 310 Q 290 330 260 310"/>
    <!-- Fangs -->
    <path d="M 290 250 L 300 280 L 310 255"/>
    <path d="M 320 255 L 330 285 L 340 260"/>
    
    <!-- Snout ridge -->
    <path d="M 180 180 Q 220 170 260 180 Q 290 190 310 210"/>
    
    <!-- Horn/spines -->
    <path d="M 160 100 Q 150 60 170 40 Q 180 50 175 80"/>
    <path d="M 200 85 Q 210 40 240 35 Q 235 55 230 80"/>
    
    <!-- Neck/throat lines -->
    <path d="M 140 230 Q 120 260 100 300"/>
    <path d="M 150 250 Q 130 290 110 340"/>
  </g>
  
  <!-- Chinese characters 龍吟 -->
  <text x="200" y="380" font-family="serif" font-size="48" fill="black" text-anchor="middle" font-weight="bold">龍吟</text>
  
  <!-- DRAGON ROAR text -->
  <text x="200" y="430" font-family="sans-serif" font-size="24" fill="black" text-anchor="middle" letter-spacing="4">DRAGON ROAR</text>
</svg>
<svg width="600" height="160" viewBox="0 0 600 160" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="160" fill="white"/>
  <!-- DF-17 Body -->
  <path fill="#000000" d="M30,80 L450,50 L450,110 Z"/>
  <!-- Forward-swept wings -->
  <path fill="#D4AF37" d="M250,60 L360,35 L420,30 L420,100 L360,95 L250,110 Z"/>
  <!-- Rear fins -->
  <path fill="#D4AF37" d="M430,55 L460,45 L460,85 L430,75 Z"/>
  <!-- Dragon head - fierce roaring -->
  <ellipse cx="45" cy="80" rx="20" ry="12" fill="#D4AF37"/>
  <!-- Open mouth -->
  <ellipse cx="30" cy="80" rx="8" ry="6" fill="#000000"/>
  <!-- Eyes -->
  <circle cx="50" cy="75" r="2" fill="#000000"/>
  <circle cx="50" cy="85" r="2" fill="#000000"/>
  <!-- Sound waves emanating from mouth -->
  <path fill="none" stroke="#D4AF37" stroke-width="2" d="M18,80 Q5,70 5,80 Q5,90 18,80"/>
  <path fill="none" stroke="#D4AF37" stroke-width="1.5" d="M10,80 Q-5,68 5,80 Q-5,92 10,80"/>
  <!-- Text -->
  <text x="300" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" letter-spacing="8" fill="#000000">CHANT</text>
  <text x="300" y="155" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="16" fill="#D4AF37">龙吟</text>
</svg>

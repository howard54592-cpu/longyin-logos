<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- 背景 -->
  <rect width="500" height="500" fill="white"/>
  
  <!-- 卓耿风Logo - 极简几何结构 -->
  <!-- 俯冲角度约-10度，整体向前收紧 -->
  
  <!-- 笔1：主骨架（鼻尖→头顶→后背→尾巴，一气呵成，有明显折角） -->
  <polyline points="250,120 280,80 320,100 420,180" 
            fill="none" stroke="black" stroke-width="8" stroke-linecap="sharp" stroke-linejoin="miter"/>
  
  <!-- 笔2：下颚（独立一笔，向外张开，尾部略向上收） -->
  <!-- 上颚 -->
  <line x1="250" y1="120" x2="310" y2="140" stroke="black" stroke-width="8" stroke-linecap="square"/>
  <!-- 下颚（更长，外扩，张口感） -->
  <polyline points="250,120 290,160 340,150" 
            fill="none" stroke="black" stroke-width="8" stroke-linecap="square" stroke-linejoin="miter"/>
  
  <!-- 笔3：身体/速度线（拉直的弧线，体现飞行+压迫） -->
  <path d="M 180,200 Q 250,280 400,220" 
        fill="none" stroke="black" stroke-width="6" stroke-linecap="round"/>
  
  <!-- 辅助参考线（可删除）：嘴巴张开角度 -->
  <!-- <line x1="250" y1="120" x2="310" y2="140" stroke="red" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="250" y1="120" x2="290" y2="160" stroke="red" stroke-width="1" stroke-dasharray="5,5"/> -->
  
  <!-- 龍吟文字 -->
  <text x="250" y="420" font-family="serif" font-size="48" text-anchor="middle" fill="black" font-weight="300">龍吟</text>
</svg>

<svg width="600" height="180" viewBox="0 0 600 180" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="180" fill="white"/>
  <!-- DF-17 Body - main wedge -->
  <path fill="#000000" d="M50,90 L480,50 L480,130 Z"/>
  <!-- Forward-swept wings - prominent -->
  <path fill="#D4AF37" d="M300,60 L420,30 L460,25 L460,105 L420,100 L300,110 Z"/>
  <!-- Rear fins -->
  <path fill="#D4AF37" d="M460,55 L490,45 L490,95 L460,85 Z"/>
  <!-- Dragon head integrated into nose -->
  <circle cx="50" cy="90" r="15" fill="#D4AF37"/>
  <!-- Dragon eye -->
  <circle cx="55" cy="85" r="3" fill="#000000"/>
  <!-- Open mouth - roaring -->
  <path fill="#000000" d="M38,90 L50,85 L50,95 Z"/>
  <!-- Sound wave arcs emanating outward (虎啸龙吟) -->
  <path fill="none" stroke="#D4AF37" stroke-width="3" d="M25,90 Q10,75 25,60"/>
  <path fill="none" stroke="#D4AF37" stroke-width="3" d="M25,90 Q10,105 25,120"/>
  <path fill="none" stroke="#D4AF37" stroke-width="2" d="M15,90 Q-5,70 15,50"/>
  <path fill="none" stroke="#D4AF37" stroke-width="2" d="M15,90 Q-5,110 15,130"/>
  <!-- Text -->
  <text x="300" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" letter-spacing="8" fill="#000000">CHANT</text>
  <text x="300" y="175" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="16" fill="#D4AF37">龙吟</text>
</svg>
